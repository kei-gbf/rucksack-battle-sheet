    /* ダイアログのサイズを広げる */
    dialog#graph-dialog {
    /* 透過・背景の指定 */
        background: rgba(22, 27, 34, 1); /* 少し透過したダークテーマ背景 */
        color: white;                      /* 文字色も調整 */

        padding: 20px;
        border-radius: 12px;
        
        /* 横スクロール対策 */
        width: 95%;
        max-width: 1200px;
        box-sizing: border-box; /* paddingを含めてサイズ計算 */
        
        /* 位置と高さ */
        position: fixed;
        top: calc(var(--header-height) + 30px + var(--dashboard-height)); /* ヘッダー高 + 余白 + ダッシュボード高 */
        max-height: 80vh;
        overflow-y: auto;
        overflow-x: hidden; /* 横スクロールを強制的に封じる */
        margin: 0 auto;
        
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);

        /* 閉じるボタン対策 */
        height: auto;
    }

    /* ::backdrop はダイアログの「外側」の背景です */
    dialog#graph-dialog::backdrop { 
        background: rgba(0, 0, 0, 0.4); /* 外側を少し暗くする */
        backdrop-filter: blur(4px);    /* すりガラス効果（対応ブラウザのみ） */
    }

    /* グラフコンテナの調整 */
    .chart-container {
        width: 100%;      /* 親の幅に合わせる */
        max-width: 100%;  /* ダイアログからはみ出さないように */
        margin: 10px auto;
        background: #161b22;
        padding: 15px;
        border: 1px solid #30363d;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        gap: 20px;        /* Canvas間のスペース */
    }

    /* Canvasのサイズ制御（重要） */
    .chart-container canvas {
        width: 100% !important; /* コンテナの幅いっぱいに */
        height: auto !important; /* アスペクト比を維持 */
        max-height: 300px;       /* 高くなりすぎないように制限 */
    }

    /* ボタンを右寄せにするスタイル */
    #graph-dialog div {
        display: flex;
        flex-direction: column;
    }

    #graph-dialog div button {
        align-self: flex-end; /* ボタンだけを右端に配置 */
        margin-top: 10px;    /* グラフとの間隔 */
    }

    <!-- 勝敗入力支援ダイアログ -->
    <script src="./modal-dialog.js"></script>
    <modal-dialog></modal-dialog>
    <script>

    async function openModalDialog() {
        const res = await startGame();
        // console.log("RESULT", res)
        if (res.ok) {
            // NOTE: only support "A" and "S" rank point
            // console.log("結果:", res.stack);
            const w = stack.filter(s => s === 'win').length;
            const l = stack.filter(s => s === 'lose').length;
            const jw = stack.slice(5-1).filter(s => s === 'win').length;
            const r = await db.records.orderBy(':id').reverse().first() ?? { rank: "D", totalRp: 0 };

            const rp = (3 * w) - {D: 0, C: 4, B: 6, A: 10, S: 14}[r.rank] + (w == 10 ? ((5-l)*5) : 0);;

            // TODO: bisect
            if (0) {
                const total = r.totalRp + {A: 0, S: 400}[r.rank] + rp;
                ui.rp.value = rp;
                ui.rank.value = (total >= 400) ? "S" : "A";
                ui.totalRp.value = (total >= 400) ? total%400 : total;
            }
            else {
                (() => {
                // 累積ボーダーの定義
                // D: 0~99, C: 100~299, B: 300~599, A: 600~999, S: 1000~
                const RANK_CONFIG = [
                    { rank: "D", min: 0 },
                    { rank: "C", min: 100 },
                    { rank: "B", min: 300 },
                    { rank: "A", min: 600 },
                    { rank: "S", min: 1000 }
                ];

                // 1. 現在のランク位置を累積ポイントとして計算
                // 例: 現在 A(600開始) で 399pt なら totalは 999
                const currentBase = RANK_CONFIG.find(c => c.rank === r.rank).min;
                const totalGlobal = currentBase + r.totalRp + rp;

                // 2. 二分探索（または単純なfindIndex）でランクを決定
                // ランクが増えてもここを二分探索に差し替えるだけでO(log N)になる
                const index = RANK_CONFIG.findLastIndex(c => totalGlobal >= c.min);
                const result = RANK_CONFIG[index];

                // 3. 値の適用
                ui.rp.value = rp;
                ui.rank.value = result.rank;
                ui.totalRp.value = totalGlobal - result.min;
                })();
            }

            ui.w.value = w;
            ui.jw.value = jw;
            stack.length = 0
        } 
    }

    document.addEventListener('keydown', (e) => {
        if (e.repeat) {
            return;
        }

        switch (e.key) {
        case 'g':
            if (dlg.graph.open) {
                dlg.graph.close();
            } else {
                dlg.graph.showModal();
                renderChart()
            }
            break;
        case 'f':
            if (dlg.input.open) {
                dlg.input.close();
            } else {
                openModalDialog()
            }
            break;
        case 'PageUp':
        case 'ArrowLeft':
            changePage('prev', PAGESIZE * (e.shiftKey ? 5 : 1));
            break;
        case 'PageDown':
        case 'ArrowRight':
            changePage('next', PAGESIZE * (e.shiftKey ? 5 : 1));
            break;
        case 'Home':
            changePage('prev', state.offset);
            break;
        case 'End':
            changePage('next', Number(ui.pageCount.dataset.maxPage)*PAGESIZE-state.offset);
            break;
        }
    });


    const dlg = {
        input: document.getElementById("gameDialog"),
        graph: document.getElementById("graph-dialog"),
        settings: document.getElementById("settings-dialog"),
    }
    const btn = {
        input: document.getElementById("btn-show-dialog"),
        graph: document.getElementById("btn-show-graph"),
        popGraph: document.getElementById("btn-popout-graph"),
        settings: document.getElementById("btn-show-settings"),
    }
    btn.input.addEventListener('click', () => {

        openModalDialog()
    })
    btn.graph.addEventListener('click', () => {
        renderChart();
        dlg.graph.showModal()
    })
    btn.popGraph.addEventListener('click', () => {
        window.open('graph.html', 'rucksack-graph');
    });
    btn.settings.addEventListener('click', () => {
        dlg.settings.showModal();
    })

    dlg.graph.addEventListener('click', (event) => {
        // クリックされた要素がdialog自身であるか判定
        if (event.target === dlg.graph) {
            dlg.graph.close();
        }
    });
    dlg.settings.addEventListener('click', (event) => {
        // クリックされた要素がdialog自身であるか判定
        if (event.target === dlg.settings) {
            dlg.settings.close();
        }
    });
    </script>
